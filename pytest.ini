[pytest]
minversion = 8.0
addopts = -ra -q --strict-markers
testpaths =
    tests

markers =
    unit: Pure unit tests (no I/O)
    integration: Multi-component tests (hits Plane API)
    e2e: Full system tests
    slow: Tests > 1 second
    safety: Safety-critical path tests (requires MC/DC)
    quarantine: Flaky tests under investigation

# GOV-002: Fail Fast, Fail Loud
# We don't enforce --maxfail=1 globally here to allow full suite runs,
# but CI will use it. 
